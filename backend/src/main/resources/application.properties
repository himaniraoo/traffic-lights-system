server.port=8080

# CORS - allow React dev server
spring.web.cors.allowed-origins=http://localhost:3000

# Logging
logging.level.com.traffic=DEBUG

# Application name
spring.application.name=traffic-signal-management

# Signal default timings (ms)
traffic.signal.green-duration=5000
traffic.signal.yellow-duration=2000
traffic.signal.red-duration=5000
